<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agenda de contactos sincronizada con Firebase Firestore">
    <title>Agenda de Contactos | Firebase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../css/agenda.css">
</head>

<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <h1>Agenda</h1>
                </div>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Conectando...</span>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Add contact form -->
            <section class="add-contact-section">
                <div class="section-header">
                    <h2>Nuevo Contacto</h2>
                    <p class="section-subtitle">Añade un contacto a tu agenda</p>
                </div>
                <form id="contactForm" class="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="inputNombre">Nombre</label>
                            <input type="text" id="inputNombre" placeholder="Ej: Juan" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="inputApellido">Apellido</label>
                            <input type="text" id="inputApellido" placeholder="Ej: García" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="inputTelefono">Teléfono</label>
                            <input type="tel" id="inputTelefono" placeholder="Ej: 612 345 678" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="inputEmail">Email</label>
                            <input type="email" id="inputEmail" placeholder="Ej: juan@email.com" autocomplete="off">
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Añadir Contacto</span>
                    </button>
                </form>
            </section>

            <!-- Search bar -->
            <section class="search-section">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Buscar contactos...">
                </div>
                <div class="contacts-count" id="contactsCount">
                    <span id="totalCount">0</span> contactos
                </div>
            </section>

            <!-- Contacts list -->
            <section class="contacts-section">
                <div class="contacts-list" id="contactsList">
                    <!-- Loading state -->
                    <div class="loading-state" id="loadingState">
                        <div class="spinner"></div>
                        <p>Cargando contactos...</p>
                    </div>
                    <!-- Empty state -->
                    <div class="empty-state" id="emptyState" style="display:none;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                        <h3>Sin contactos</h3>
                        <p>Añade tu primer contacto usando el formulario</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Edit Modal -->
        <div class="modal-overlay" id="editModal">
            <div class="modal">
                <div class="modal-header">
                    <h3>Editar Contacto</h3>
                    <button class="btn-close" id="btnCloseModal" aria-label="Cerrar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <form id="editForm" class="contact-form">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label for="editNombre">Nombre</label>
                        <input type="text" id="editNombre" required>
                    </div>
                    <div class="form-group">
                        <label for="editApellido">Apellido</label>
                        <input type="text" id="editApellido">
                    </div>
                    <div class="form-group">
                        <label for="editTelefono">Teléfono</label>
                        <input type="tel" id="editTelefono">
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email</label>
                        <input type="email" id="editEmail">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="btnCancelEdit">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- Firebase SDK (CDN compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
